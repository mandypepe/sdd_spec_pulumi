[pytest]
# Configuration for pytest test runner
addopts = -v --tb=short
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Filter out unrelated deprecation warnings from external libraries
filterwarnings =
    # Suppress Pulumi AWS provider deprecation warnings unrelated to our code
    ignore::DeprecationWarning:pulumi_aws.ec2.encryption_control
    # Suppress Python asyncio warnings from external libraries
    ignore::DeprecationWarning:asyncio
